name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: saasdb
          POSTGRES_USER: saasuser
          POSTGRES_PASSWORD: saaspass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U saasuser
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn package -B
    - name: Run tests
      run: mvn test -B
    - name: Build Docker image
      run: docker build -t saas-starter -f docker/Dockerfile .
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-jar
        path: target/*.jar
