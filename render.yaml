services:
  - type: web
    name: saas-starter
    runtime: java
    region: frankfurt
    plan: free
    buildCommand: ./mvnw package -DskipTests
    startCommand: java -jar target/saas-starter-1.0.0.jar
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: saas-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: saas-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: saas-db
          property: password
      - key: APP_JWT_SECRET
        generateValue: true
        length: 64

databases:
  - name: saas-db
    plan: free
    region: frankfurt
    databaseName: saasdb
    user: saasuser
